name: PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, feat/rust-terminal-manager]

concurrency:
  group: pr-quality-gate-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: [self-hosted, Windows, X64, local-windows]
    timeout-minutes: 20
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        shell: powershell
        run: |
          $toolchainBin = "$env:USERPROFILE\.rustup\toolchains\stable-x86_64-pc-windows-msvc\bin"
          if (-not (Test-Path "$toolchainBin\cargo.exe")) {
            throw "Stable Rust toolchain is missing at $toolchainBin"
          }
          $toolchainBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$toolchainBin\cargo.exe" --version
          & "$toolchainBin\cargo-clippy.exe" --version
          & "$toolchainBin\cargo-fmt.exe" --version

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy lints
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test --all

  coverage:
    name: Code Coverage
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feat/rust-terminal-manager')
    runs-on: [self-hosted, Windows, X64, local-windows]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        shell: powershell
        run: |
          $toolchainBin = "$env:USERPROFILE\.rustup\toolchains\stable-x86_64-pc-windows-msvc\bin"
          if (-not (Test-Path "$toolchainBin\cargo.exe")) {
            throw "Stable Rust toolchain is missing at $toolchainBin"
          }
          $toolchainBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$toolchainBin\cargo.exe" --version

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        shell: powershell
        run: |
          $cargoLlvmCov = "$env:USERPROFILE\.cargo\bin\cargo-llvm-cov.exe"
          if (-not (Test-Path $cargoLlvmCov)) {
            cargo install cargo-llvm-cov --locked
          }

      - name: Generate coverage report
        shell: powershell
        run: |
          $toolchainBin = "$env:USERPROFILE\.rustup\toolchains\stable-x86_64-pc-windows-msvc\bin"
          $env:PATH = "$toolchainBin;$env:USERPROFILE\.cargo\bin;$env:PATH"
          cargo llvm-cov --all-features --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info
