name: PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, feat/rust-terminal-manager]

concurrency:
  group: pr-quality-gate-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: [self-hosted, Windows, X64, local-windows]
    timeout-minutes: 20
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
      # Self-hosted runner shares $USERPROFILE with the developer. Without
      # this redirect, Swatinem/rust-cache@v2 wipes ~/.cargo/bin on cache
      # restore, deleting the dev box's rustup proxy shims every PR run
      # (4-incident streak May 5-13, 2026, root-caused via NTFS audit on
      # ~/.cargo/bin and ~/.rustup -- see unshit-test-framework/scripts/).
      CARGO_HOME: C:\Users\Alan Beelink\actions-runner\.cargo-runner
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        shell: powershell
        run: |
          $toolchainBin = "$env:USERPROFILE\.rustup\toolchains\stable-x86_64-pc-windows-msvc\bin"
          if (-not (Test-Path "$toolchainBin\cargo.exe")) {
            throw "Stable Rust toolchain is missing at $toolchainBin"
          }
          $toolchainBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$toolchainBin\cargo.exe" --version
          & "$toolchainBin\cargo-clippy.exe" --version
          & "$toolchainBin\cargo-fmt.exe" --version

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy lints
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test --all

  repair-failing-checks:
    name: Repair Failing Checks
    needs: rust-checks
    if: >
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.rust-checks.result == 'failure'
    runs-on: [self-hosted, Windows, X64, local-windows]
    timeout-minutes: 45
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      # Same rationale as rust-checks: keep cargo state off the developer's
      # ~/.cargo. Claude Code runs with --dangerously-skip-permissions, so any
      # cargo install it triggers would otherwise pollute / wipe the dev shims too.
      CARGO_HOME: C:\Users\Alan Beelink\actions-runner\.cargo-runner

    steps:
      - name: Add Claude Code CLI to PATH
        shell: powershell
        run: |
          $claudeBin = Join-Path $env:USERPROFILE '.local\bin'
          if (Test-Path $claudeBin) {
            $claudeBin >> $env:GITHUB_PATH
            $env:PATH = "$claudeBin;$env:PATH"
          }

      - name: Check Claude Code configuration
        id: config
        shell: powershell
        run: |
          $hasClaude = $null -ne (Get-Command claude -ErrorAction SilentlyContinue)
          $hasToken = -not [string]::IsNullOrWhiteSpace($env:CLAUDE_CODE_OAUTH_TOKEN)
          $hasApp = (-not [string]::IsNullOrWhiteSpace($env:APP_ID)) -and (-not [string]::IsNullOrWhiteSpace($env:APP_PRIVATE_KEY))
          $ready = $hasClaude -and $hasToken
          "ready=$($ready.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "has_app=$($hasApp.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

          if (-not $ready) {
            "Automated repair cannot run." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Required: Claude Code CLI plus CLAUDE_CODE_OAUTH_TOKEN configured on the runner." >> $env:GITHUB_STEP_SUMMARY
            exit 1
          }

      - name: Generate GitHub App token
        id: app-token
        if: steps.config.outputs.ready == 'true' && steps.config.outputs.has_app == 'true'
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout PR branch
        if: steps.config.outputs.ready == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.app-token.outputs.token || github.token }}
          fetch-depth: 0

      - name: Skip stale repair runs
        id: stale
        if: steps.config.outputs.ready == 'true'
        shell: powershell
        run: |
          $current = git rev-parse HEAD
          $expected = "${{ github.event.pull_request.head.sha }}"
          $stale = $current -ne $expected
          "stale=$($stale.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          if ($stale) {
            "Skipping automated repair because the PR branch moved from $expected to $current." >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Fetch PR base
        if: steps.config.outputs.ready == 'true' && steps.stale.outputs.stale != 'true'
        shell: powershell
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1

      - name: Configure git identity
        if: steps.config.outputs.ready == 'true' && steps.stale.outputs.stale != 'true'
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Skip repeated repair commits
        id: guard
        if: steps.config.outputs.ready == 'true' && steps.stale.outputs.stale != 'true'
        shell: powershell
        run: |
          $message = git log -1 --pretty=%B
          $message = $message -join "`n"
          $skip = [bool]($message -match '\[agent-fix\]')
          "skip=$($skip.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          if ($skip) {
            "Skipping automated repair because the failing head commit is already an agent repair commit." >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Run Claude Sonnet 5 high-effort repair
        if: steps.config.outputs.ready == 'true' && steps.stale.outputs.stale != 'true' && steps.guard.outputs.skip != 'true'
        shell: powershell
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          $prompt = @'
            The PR quality gate failed for PR #${{ github.event.pull_request.number }}.

            Diagnose why the Rust checks are not passing:
            - `cargo fmt --check`
            - `cargo clippy -- -D warnings`
            - `cargo test --all`

            Fix the smallest root cause inside this PR branch. Preserve project invariants from AGENTS.md:
            - Do not add synchronous IPC to the render path.
            - Do not remove eager PTY spawning in `main.rs`.
            - Keep framework-level behavior in `crates/unshit-framework/`.
            - Do not touch generated artifacts, target directories, or unrelated files.

            If you can fix the failure:
            - Run the relevant verification, including the command that failed.
            - Commit with message `fix: repair failing PR checks [agent-fix]`.
            - Push to this PR branch.

            If you cannot fix the failure safely:
            - Leave the tree unchanged.
            - Comment on the PR with the failing command, the root cause, and the blocker.
            - Exit non-zero.
          '@

          $previousErrorActionPreference = $ErrorActionPreference
          $ErrorActionPreference = 'Continue'
          try {
            $prompt | claude -p `
              --model claude-sonnet-5 `
              --effort high `
              --dangerously-skip-permissions `
              --bare
            $claudeExitCode = $LASTEXITCODE
          } finally {
            $ErrorActionPreference = $previousErrorActionPreference
          }

          if ($claudeExitCode -ne 0) {
            exit $claudeExitCode
          }

  coverage:
    name: Code Coverage
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feat/rust-terminal-manager')
    runs-on: [self-hosted, Windows, X64, local-windows]
    timeout-minutes: 25
    env:
      # See rust-checks job for the why. cargo-llvm-cov installs here too.
      CARGO_HOME: C:\Users\Alan Beelink\actions-runner\.cargo-runner
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        shell: powershell
        run: |
          $toolchainBin = "$env:USERPROFILE\.rustup\toolchains\stable-x86_64-pc-windows-msvc\bin"
          if (-not (Test-Path "$toolchainBin\cargo.exe")) {
            throw "Stable Rust toolchain is missing at $toolchainBin"
          }
          $toolchainBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$toolchainBin\cargo.exe" --version

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        shell: powershell
        run: |
          $cargoLlvmCov = "$env:CARGO_HOME\bin\cargo-llvm-cov.exe"
          if (-not (Test-Path $cargoLlvmCov)) {
            cargo install cargo-llvm-cov --locked
          }

      - name: Generate coverage report
        shell: powershell
        run: |
          $toolchainBin = "$env:USERPROFILE\.rustup\toolchains\stable-x86_64-pc-windows-msvc\bin"
          $env:PATH = "$toolchainBin;$env:CARGO_HOME\bin;$env:PATH"
          cargo llvm-cov --all-features --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info
