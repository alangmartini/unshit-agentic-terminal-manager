name: Agentic Simplify

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: agentic-simplify-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  simplify:
    name: Run /simplify
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Windows, X64, local-windows]
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

    steps:
      - name: Check agent configuration
        id: config
        shell: powershell
        run: |
          $hasAnthropic = -not [string]::IsNullOrWhiteSpace($env:ANTHROPIC_API_KEY)
          $hasApp = (-not [string]::IsNullOrWhiteSpace($env:APP_ID)) -and (-not [string]::IsNullOrWhiteSpace($env:APP_PRIVATE_KEY))
          $ready = $hasAnthropic -and $hasApp
          "ready=$($ready.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

          if (-not $ready) {
            "Agentic simplify skipped." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Required repository secrets: ANTHROPIC_API_KEY, APP_ID, APP_PRIVATE_KEY." >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Generate GitHub App token
        id: app-token
        if: steps.config.outputs.ready == 'true'
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout PR branch
        if: steps.config.outputs.ready == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Fetch PR base
        if: steps.config.outputs.ready == 'true'
        shell: powershell
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1

      - name: Skip agent-generated simplify commits
        id: guard
        if: steps.config.outputs.ready == 'true'
        shell: powershell
        run: |
          $message = git log -1 --pretty=%B
          $skip = $message -match '\[agent-simplify\]'
          "skip=$($skip.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          if ($skip) {
            "Skipping because the head commit already came from agentic simplify." >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Run /simplify
        if: steps.config.outputs.ready == 'true' && steps.guard.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: |
            Run `/simplify` for PR #${{ github.event.pull_request.number }}.

            Scope:
            - Compare this PR branch against `${{ github.event.pull_request.base.ref }}`.
            - Simplify only code touched by this PR, plus directly adjacent helper code when needed.
            - Preserve behavior exactly. Do not add features.
            - Do not touch generated artifacts, target directories, or unrelated files.

            If useful simplifications exist:
            - Apply the smallest behavior-preserving edits.
            - Run the smallest relevant verification. For Rust code, include `cargo fmt --check` and `cargo clippy -- -D warnings`; run focused tests or `cargo test --all` when the change is broad.
            - Commit with message `refactor: simplify PR changes [agent-simplify]`.
            - Push to this PR branch.

            If no useful simplification exists:
            - Leave the tree unchanged.
            - Comment on the PR that no simplification changes were needed.

            If verification fails:
            - Do not push.
            - Comment on the PR with the failing command and the root cause.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 10
