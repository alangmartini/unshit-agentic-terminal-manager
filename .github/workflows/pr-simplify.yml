name: Agentic PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: agentic-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  simplify:
    name: Run simplify and review
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Windows, X64, local-windows]
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      # Codex sandbox may run cargo; keep its writes off the developer's
      # ~/.cargo (see pr-review.yml for the multi-incident root-cause note).
      CARGO_HOME: C:\Users\Alan Beelink\actions-runner\.cargo-runner

    steps:
      - name: Add Codex CLI to PATH
        shell: powershell
        run: |
          $npmBin = Join-Path $env:APPDATA 'npm'
          if (Test-Path $npmBin) {
            $npmBin >> $env:GITHUB_PATH
            $env:PATH = "$npmBin;$env:PATH"
          }

      - name: Check Codex configuration
        id: config
        shell: powershell
        run: |
          $hasCodex = $null -ne (Get-Command codex -ErrorAction SilentlyContinue)
          $hasOpenAIKey = -not [string]::IsNullOrWhiteSpace($env:OPENAI_API_KEY)
          $hasCodexLogin = $false
          if ($hasCodex -and -not $hasOpenAIKey) {
            $previousErrorActionPreference = $ErrorActionPreference
            $ErrorActionPreference = 'Continue'
            try {
              & codex login status 2>&1 | Out-Null
              $hasCodexLogin = $LASTEXITCODE -eq 0
            } finally {
              $ErrorActionPreference = $previousErrorActionPreference
            }
          }
          $hasApp = (-not [string]::IsNullOrWhiteSpace($env:APP_ID)) -and (-not [string]::IsNullOrWhiteSpace($env:APP_PRIVATE_KEY))
          $ready = $hasCodex -and ($hasOpenAIKey -or $hasCodexLogin)
          "ready=$($ready.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "has_app=$($hasApp.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

          if (-not $ready) {
            "Agentic PR review cannot run." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Required: Codex CLI plus either OPENAI_API_KEY or an existing Codex login on the runner." >> $env:GITHUB_STEP_SUMMARY
            exit 1
          }

      - name: Generate GitHub App token
        id: app-token
        if: steps.config.outputs.ready == 'true' && steps.config.outputs.has_app == 'true'
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout PR branch
        if: steps.config.outputs.ready == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.app-token.outputs.token || github.token }}
          fetch-depth: 0

      - name: Fetch PR base
        if: steps.config.outputs.ready == 'true'
        shell: powershell
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1

      - name: Configure git identity
        if: steps.config.outputs.ready == 'true'
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure Codex auth
        if: steps.config.outputs.ready == 'true'
        shell: powershell
        run: |
          $previousErrorActionPreference = $ErrorActionPreference
          $ErrorActionPreference = 'Continue'
          try {
            if (-not [string]::IsNullOrWhiteSpace($env:OPENAI_API_KEY)) {
              $loginOutput = $env:OPENAI_API_KEY | codex login --with-api-key 2>&1
              $loginExitCode = $LASTEXITCODE
              $loginOutput | ForEach-Object { Write-Host $_ }
              if ($loginExitCode -ne 0) {
                exit $loginExitCode
              }
            }

            $statusOutput = & codex login status 2>&1
            $statusExitCode = $LASTEXITCODE
            $statusOutput | ForEach-Object { Write-Host $_ }
            if ($statusExitCode -ne 0) {
              exit $statusExitCode
            }
          } finally {
            $ErrorActionPreference = $previousErrorActionPreference
          }

      - name: Skip agent-generated commits
        id: guard
        if: steps.config.outputs.ready == 'true'
        shell: powershell
        run: |
          $message = git log -1 --pretty=%B
          $message = $message -join "`n"
          $skip = [bool]($message -match '\[(agent-simplify|agent-fix)\]')
          "skip=$($skip.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          if ($skip) {
            "Skipping because the head commit already came from an agentic workflow." >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Run simplify and review
        id: agent
        if: steps.config.outputs.ready == 'true' && steps.guard.outputs.skip != 'true'
        shell: powershell
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          $before = git rev-parse HEAD
          $prompt = @'
            Run the code-simplification and code-review-and-quality passes for PR #${{ github.event.pull_request.number }}.

            Scope:
            - Compare this PR branch against `${{ github.event.pull_request.base.ref }}`.
            - Simplify and review only code touched by this PR, plus directly adjacent helper code when needed.
            - Preserve behavior exactly. Do not add features.
            - Do not touch generated artifacts, target directories, or unrelated files.
            - Review for correctness, simplicity/readability, architecture, security, performance, and missing tests.
            - Do not repair pre-existing CI-only formatting, clippy, or test failures. The PR Quality Gate repair job owns failing checks.

            If useful simplifications exist:
            - Apply the smallest behavior-preserving edits.
            - Run the smallest relevant verification. For Rust code, include `cargo fmt --check` and `cargo clippy -- -D warnings`; run focused tests or `cargo test --all` when the change is broad.
            - Commit with message `refactor: simplify PR changes [agent-simplify]`.
            - Push to this PR branch.

            If required review findings exist:
            - If you can safely fix them within this PR scope, make the smallest fix, run relevant verification, commit with message `fix: address agentic review findings [agent-simplify]`, and push.
            - If you cannot safely fix them, leave the tree unchanged, comment on the PR with the required findings and verification status, and exit non-zero so this workflow does not approve the PR.

            If no useful simplification and no required review findings exist:
            - Leave the tree unchanged.
            - Comment on the PR that no simplification or review changes were needed.
            - Exit zero.

            If verification fails:
            - Do not push.
            - Comment on the PR with the failing command and the root cause.
            - Exit non-zero.
          '@

          $previousErrorActionPreference = $ErrorActionPreference
          $ErrorActionPreference = 'Continue'
          try {
            $prompt | codex --ask-for-approval never exec `
              --model gpt-5.3-codex-spark `
              --sandbox danger-full-access `
              --ephemeral `
              --cd "$PWD" `
              -
            $codexExitCode = $LASTEXITCODE
          } finally {
            $ErrorActionPreference = $previousErrorActionPreference
          }

          $after = git rev-parse HEAD
          $status = git status --porcelain
          $changed = $before -ne $after
          $dirty = -not [string]::IsNullOrWhiteSpace($status)
          "changed=$($changed.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "dirty=$($dirty.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

          if ($codexExitCode -ne 0) {
            exit $codexExitCode
          }

          if ($dirty) {
            Write-Host "Codex left uncommitted changes; refusing to approve or continue."
            git status --short
            exit 1
          }

      - name: Approve unchanged clean PR
        if: steps.config.outputs.ready == 'true' && steps.guard.outputs.skip != 'true' && steps.agent.outputs.changed == 'false' && steps.agent.outputs.dirty == 'false'
        shell: powershell
        env:
          REVIEW_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:REVIEW_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $body = @{
            event = "APPROVE"
            body = "Agentic simplify and review found no required changes."
          } | ConvertTo-Json
          $uri = "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews"
          Invoke-RestMethod -Method Post -Uri $uri -Headers $headers -Body $body -ContentType "application/json"
          "Approved PR because simplify/review completed cleanly without changing the branch." >> $env:GITHUB_STEP_SUMMARY
