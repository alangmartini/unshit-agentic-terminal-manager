name: Agentic PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: agentic-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  simplify:
    name: Run simplify and review
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Windows, X64, local-windows]
    timeout-minutes: 30
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      # Claude Code may run cargo; keep its writes off the developer's
      # ~/.cargo (see pr-review.yml for the multi-incident root-cause note).
      CARGO_HOME: C:\Users\Alan Beelink\actions-runner\.cargo-runner

    steps:
      - name: Add Claude Code CLI to PATH
        shell: powershell
        run: |
          $claudeBin = Join-Path $env:USERPROFILE '.local\bin'
          if (Test-Path $claudeBin) {
            $claudeBin >> $env:GITHUB_PATH
            $env:PATH = "$claudeBin;$env:PATH"
          }

      - name: Check Claude Code configuration
        id: config
        shell: powershell
        run: |
          $hasClaude = $null -ne (Get-Command claude -ErrorAction SilentlyContinue)
          $hasToken = -not [string]::IsNullOrWhiteSpace($env:CLAUDE_CODE_OAUTH_TOKEN)
          $hasApp = (-not [string]::IsNullOrWhiteSpace($env:APP_ID)) -and (-not [string]::IsNullOrWhiteSpace($env:APP_PRIVATE_KEY))
          $ready = $hasClaude -and $hasToken
          "ready=$($ready.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "has_app=$($hasApp.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

          if (-not $ready) {
            "Agentic PR review cannot run." >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Required: Claude Code CLI plus CLAUDE_CODE_OAUTH_TOKEN configured on the runner." >> $env:GITHUB_STEP_SUMMARY
            exit 1
          }

      - name: Generate GitHub App token
        id: app-token
        if: steps.config.outputs.ready == 'true' && steps.config.outputs.has_app == 'true'
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout PR branch
        if: steps.config.outputs.ready == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.app-token.outputs.token || github.token }}
          fetch-depth: 0

      - name: Fetch PR base
        if: steps.config.outputs.ready == 'true'
        shell: powershell
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1

      - name: Configure git identity
        if: steps.config.outputs.ready == 'true'
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Skip agent-generated commits
        id: guard
        if: steps.config.outputs.ready == 'true'
        shell: powershell
        run: |
          $message = git log -1 --pretty=%B
          $message = $message -join "`n"
          $skip = [bool]($message -match '\[(agent-simplify|agent-fix)\]')
          "skip=$($skip.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          if ($skip) {
            "Skipping because the head commit already came from an agentic workflow." >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Run simplify and review
        id: agent
        if: steps.config.outputs.ready == 'true' && steps.guard.outputs.skip != 'true'
        shell: powershell
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          $before = git rev-parse HEAD
          $prompt = @'
            Run two passes for PR #${{ github.event.pull_request.number }}:
            1. Behavior-preserving simplification of code touched by this PR.
            2. A thermo-nuclear code quality review (directives below).

            Scope (applies to both passes):
            - Compare this PR branch against `${{ github.event.pull_request.base.ref }}`.
            - Touch only code introduced or modified by this PR, plus directly adjacent helper code when restructuring requires it.
            - Preserve behavior exactly. Do not add features.
            - Do not touch generated artifacts, target directories, or unrelated files.
            - Do not repair pre-existing CI-only formatting, clippy, or test failures. The PR Quality Gate repair job owns failing checks.

            ## Pass 1 - Behavior-preserving simplification

            Apply the smallest behavior-preserving edits that meaningfully reduce complexity in the diff.

            ## Pass 2 - Thermo-nuclear code quality review

            Adapted from `cursor/plugins` `thermo-nuclear-code-quality-review` skill.

            Perform a deep code quality audit of this PR's changes. Rethink how to structure / implement the changes to meaningfully improve code quality without impacting behavior. Work to improve abstractions, modularity, reduce spaghetti code, improve succinctness and legibility. Be ambitious - if there is a clear path to improving the implementation that involves restructuring some of the codebase, go for it. Be extremely thorough and rigorous. Measure twice, cut once.

            Non-negotiable standards:
            0. Be ambitious about structural simplification. Look for "code judo" moves that delete whole branches, helpers, modes, conditionals, or layers - not just rearrange them. Prefer the solution that makes the code feel inevitable in hindsight.
            1. Do not let this PR push a file from under 1000 lines to over 1000 lines without a very strong reason. Prefer extracting helpers, subcomponents, modules, or local abstractions. If the diff crosses that threshold, explicitly ask whether the code should be decomposed first.
            2. Reject random spaghetti growth in existing code. Be highly suspicious of new ad-hoc conditionals, scattered special cases, or one-off branches inserted into unrelated flows. Push the logic into a dedicated abstraction, helper, state machine, policy object, or separate module instead of tangling an existing path.
            3. Bias toward cleaning the design, not just accepting working code. Strongly prefer simplifications that remove moving pieces altogether over refactors that merely spread the same complexity around.
            4. Prefer direct, boring, maintainable code over hacky or magical code. Flag thin abstractions, identity wrappers, or pass-through helpers that add indirection without buying clarity.
            5. Push hard on type and boundary cleanliness when they affect maintainability. Question unnecessary optionality, casts, or silent fallbacks that paper over unclear invariants.
            6. Keep logic in the canonical layer and reuse existing helpers. Call out feature logic leaking into shared paths or implementation details leaking through APIs.
            7. Treat unnecessary sequential orchestration and non-atomic updates as design smells when a cleaner structure is obvious.

            For every meaningful change, ask:
            - Is there a "code judo" move that would make this dramatically simpler?
            - Can this change be reframed so fewer concepts, branches, or helper layers are needed?
            - Did the diff add branching complexity where a better abstraction should exist?
            - Did this change enlarge a file or component past a healthy size boundary?
            - Are there repeated conditionals that signal a missing model or missing helper?
            - Is this abstraction actually earning its keep, or is it just a wrapper?
            - Is this logic living in the canonical layer, or did the diff leak details across a boundary?

            Prioritize findings in this order: structural regressions, missed dramatic simplifications, spaghetti/branching growth, boundary/abstraction/type-contract problems, file-size/decomposition concerns, modularity/abstraction issues, legibility. Do not flood the review with low-value nits; prefer a small number of high-conviction comments. Do not approve merely because behavior seems correct.

            ## Action rules (apply to both passes)

            If useful simplifications or actionable thermo-nuclear restructurings exist that you can apply safely:
            - Make the smallest edits that capture the win.
            - Run the smallest relevant verification. For Rust code, include `cargo fmt --check` and `cargo clippy -- -D warnings`; run focused tests or `cargo test --all` when the change is broad.
            - Commit with message `refactor: simplify PR changes [agent-simplify]` for behavior-preserving simplifications, or `fix: address agentic review findings [agent-simplify]` for review-driven fixes.
            - Push to this PR branch.

            If required review findings exist that you cannot safely fix within this PR scope:
            - Leave the tree unchanged.
            - Comment on the PR with the required findings (structural regressions, missed code-judo moves, spaghetti growth, boundary leaks, file-size explosions, etc.) and verification status.
            - Exit non-zero so this workflow does not approve the PR.

            If no useful simplification and no required review findings exist:
            - Leave the tree unchanged.
            - Comment on the PR that no simplification or review changes were needed.
            - Exit zero.

            If verification fails:
            - Do not push.
            - Comment on the PR with the failing command and the root cause.
            - Exit non-zero.
          '@

          $previousErrorActionPreference = $ErrorActionPreference
          $ErrorActionPreference = 'Continue'
          try {
            $prompt | claude -p `
              --model claude-sonnet-5 `
              --effort high `
              --dangerously-skip-permissions `
              --bare
            $claudeExitCode = $LASTEXITCODE
          } finally {
            $ErrorActionPreference = $previousErrorActionPreference
          }

          $after = git rev-parse HEAD
          $status = git status --porcelain
          $changed = $before -ne $after
          $dirty = -not [string]::IsNullOrWhiteSpace($status)
          "changed=$($changed.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "dirty=$($dirty.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

          if ($claudeExitCode -ne 0) {
            exit $claudeExitCode
          }

          if ($dirty) {
            Write-Host "Claude left uncommitted changes; refusing to approve or continue."
            git status --short
            exit 1
          }

      - name: Approve unchanged clean PR
        if: steps.config.outputs.ready == 'true' && steps.guard.outputs.skip != 'true' && steps.agent.outputs.changed == 'false' && steps.agent.outputs.dirty == 'false'
        shell: powershell
        env:
          REVIEW_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:REVIEW_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $body = @{
            event = "APPROVE"
            body = "Agentic simplify + thermo-nuclear code quality review found no required changes."
          } | ConvertTo-Json
          $uri = "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews"
          Invoke-RestMethod -Method Post -Uri $uri -Headers $headers -Body $body -ContentType "application/json"
          "Approved PR because simplify/review completed cleanly without changing the branch." >> $env:GITHUB_STEP_SUMMARY
