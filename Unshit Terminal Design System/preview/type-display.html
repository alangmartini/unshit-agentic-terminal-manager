<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-base);overflow:hidden}
  .row{display:flex;align-items:baseline;gap:14px;padding:6px 0;border-bottom:1px solid var(--border-hair)}
  .row:last-child{border:none}
  .meta{color:var(--fg-tertiary);font-size:10px;width:120px;flex-shrink:0}
  .specimen{color:var(--fg-primary)}
  .display{font:var(--type-display);color:var(--amber-50)}
  .h1{font:var(--type-h1)}
  .h2{font:var(--type-h2)}
  .body{font:var(--type-body)}
</style></head>
<body>
  <div class="row"><span class="meta">display 16/600</span><span class="specimen display">terminal.mgr</span></div>
  <div class="row"><span class="meta">h1 14/600</span><span class="specimen h1">Default shell</span></div>
  <div class="row"><span class="meta">h2 13/600</span><span class="specimen h2">Configured agents</span></div>
  <div class="row"><span class="meta">body 12/400</span><span class="specimen body">Reopen last active session and panes on launch.</span></div>
</body></html>
