<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:var(--bg-base);overflow:hidden}
  .row{display:flex;align-items:center;gap:10px;padding:3px 0}
  .label{font-size:10px;color:var(--fg-tertiary);width:60px}
  .bar{height:14px;background:var(--amber-300);box-shadow:var(--glow-amber-s);border-radius:1px}
  .px{font-size:10px;color:var(--fg-secondary);font-variant-numeric:tabular-nums}
</style></head>
<body>
  <div class="row"><span class="label">sp-1</span><div class="bar" style="width:2px"></div><span class="px">2 px</span></div>
  <div class="row"><span class="label">sp-2</span><div class="bar" style="width:4px"></div><span class="px">4 px</span></div>
  <div class="row"><span class="label">sp-3</span><div class="bar" style="width:6px"></div><span class="px">6 px</span></div>
  <div class="row"><span class="label">sp-4</span><div class="bar" style="width:8px"></div><span class="px">8 px</span></div>
  <div class="row"><span class="label">sp-5</span><div class="bar" style="width:12px"></div><span class="px">12 px</span></div>
  <div class="row"><span class="label">sp-6</span><div class="bar" style="width:16px"></div><span class="px">16 px</span></div>
  <div class="row"><span class="label">sp-7</span><div class="bar" style="width:20px"></div><span class="px">20 px</span></div>
  <div class="row"><span class="label">sp-8</span><div class="bar" style="width:24px"></div><span class="px">24 px</span></div>
  <div class="row"><span class="label">sp-10</span><div class="bar" style="width:32px"></div><span class="px">32 px</span></div>
</body></html>
