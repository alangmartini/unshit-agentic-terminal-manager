<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:var(--bg-base);overflow:hidden;font:var(--type-body)}
  .line{padding:1px 0}
  .prompt{color:var(--amber-300);text-shadow:0 0 6px rgba(212,163,72,.35)}
  .path{color:var(--azure)}
  .branch{color:var(--sage)}
  .cmd{color:var(--fg-primary)}
  .info{color:var(--azure)}
  .warn{color:var(--amber-200)}
  .success{color:var(--sage)}
  .error{color:var(--rust)}
  .dim{color:var(--fg-tertiary)}
  .cursor{display:inline-block;width:7px;height:1.05em;background:var(--amber-200);vertical-align:text-bottom;box-shadow:0 0 8px rgba(232,185,85,.6);animation:bl 1.1s steps(2) infinite}
  @keyframes bl{50%{opacity:0}}
</style></head>
<body>
  <div class="line"><span class="prompt">❯</span> <span class="path">~/main/dashboard</span> <span class="branch">(main)</span></div>
  <div class="line"><span class="prompt">❯</span> <span class="cmd">go run main.go --port 4040 --watch</span></div>
  <div class="line"><span class="info">→ listening on http://localhost:4040</span></div>
  <div class="line"><span class="success">✓ resolved 23 dependencies in 1.42s</span></div>
  <div class="line"><span class="warn">[14:32:14] slow query: users.many   340ms</span></div>
  <div class="line"><span class="error">✗ encodes tabular data correctly</span></div>
  <div class="line"><span class="dim">  expected 42 to be 41</span></div>
  <div class="line"><span class="prompt">❯</span> <span class="cursor"></span></div>
</body></html>
