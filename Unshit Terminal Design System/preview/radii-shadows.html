<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:var(--bg-base);overflow:hidden;display:grid;grid-template-columns:1fr 1fr;gap:18px}
  h4{margin:0 0 8px;font:var(--type-meta);color:var(--fg-tertiary);text-transform:lowercase;letter-spacing:.12em}
  .row{display:flex;gap:14px;align-items:center}
  .chip{width:42px;height:42px;background:var(--bg-elevated);border:1px solid var(--border-soft);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--fg-tertiary)}
  .shadow{width:60px;height:36px;background:var(--bg-elevated);border:1px solid var(--border-soft);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--fg-tertiary)}
</style></head>
<body>
  <div>
    <h4>radii</h4>
    <div class="row">
      <div class="chip" style="border-radius:2px">sm 2</div>
      <div class="chip" style="border-radius:3px">md 3</div>
      <div class="chip" style="border-radius:6px">lg 6</div>
      <div class="chip" style="border-radius:8px">xl 8</div>
    </div>
  </div>
  <div>
    <h4>shadow + glow</h4>
    <div class="row">
      <div class="shadow" style="box-shadow:0 1px 2px rgba(0,0,0,.3)">sm</div>
      <div class="shadow" style="box-shadow:0 4px 14px rgba(0,0,0,.45)">md</div>
      <div class="shadow" style="box-shadow:0 14px 40px rgba(0,0,0,.65)">lg</div>
      <div class="shadow" style="box-shadow:0 0 18px rgba(212,163,72,.35);border-color:var(--amber-400)">glow</div>
    </div>
  </div>
</body></html>
