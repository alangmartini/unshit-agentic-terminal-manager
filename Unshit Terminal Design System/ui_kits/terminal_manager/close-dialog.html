<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>terminal.mgr — close prompt</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="kit.css">
  <link rel="stylesheet" href="close-dialog.css">
  <style>
    body { margin: 0; height: 100vh; overflow: hidden; background: var(--bg-void); }
    #icons { display: none; }
    .stage {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 85% 0%, rgba(212,163,72,.025), transparent 70%),
        var(--bg-void);
    }
    .stage::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background-image: repeating-linear-gradient(0deg, transparent 0, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 3px);
      opacity: .10; mix-blend-mode: multiply;
    }
  </style>
</head>
<body>
  <div id="icons"></div>
  <div class="stage"></div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    fetch("../../assets/icons/icons.svg").then(r => r.text()).then(t => {
      document.getElementById("icons").innerHTML = t;
    });
  </script>

  <script type="text/babel" src="close-dialog.jsx"></script>

  <script type="text/babel">
    const { useState } = React;
    function App() {
      const [open, setOpen] = useState(true);
      return (
        <>
          {open && <CloseDialog runningCount={3} agentCount={1} onClose={() => setTimeout(() => setOpen(true), 400) || setOpen(false)} />}
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
