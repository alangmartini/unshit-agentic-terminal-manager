[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# Statically link the MSVC C runtime so the distributed binaries are
# self-contained and do not require the Visual C++ Redistributable on the
# target machine.
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

[alias]
xtask = "run --package xtask --"
profile-cpu = "run --package xtask -- profile cpu"
profile-memory = "run --package xtask -- profile memory"
profile-all = "run --package xtask -- profile all"
